<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Your image -->
<img src="image.png" id="uploadImage" style="cursor: pointer;" alt="Upload Image">

<!-- Hidden file input -->
<input type="file" id="fileInput" style="display: none;">
<script>
    // Get references to the image and the hidden file input
const uploadImage = document.getElementById('uploadImage');
const fileInput = document.getElementById('fileInput');

// Add a click event listener to the image
uploadImage.addEventListener('click', function() {
    // Trigger click on the hidden file input when the image is clicked
    fileInput.click();
});

// Handle file selection/change in the hidden file input
fileInput.addEventListener('change', function() {
    // Access the selected file(s) if needed
    const selectedFile = fileInput.files[0];
    console.log('Selected file:', selectedFile);
    
    // Perform further actions with the selected file (e.g., upload)
    // You can add code here to handle file upload or processing
});

</script>
</body>
</html>
